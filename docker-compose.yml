services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-fanqie_db}
      POSTGRES_USER: ${DB_USER:-fanqie_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fanqie_pass_26013}
      TZ: ${TZ:-UTC}
    ports:
      - "26008:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fanqie_user} -d ${DB_NAME:-fanqie_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "5000:5000"
    environment:
      PYTHONPATH: /app
      FLASK_APP: app.py
      FLASK_ENV: ${FLASK_ENV:-production}
      PYTHONUNBUFFERED: "1"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-a-very-secret-key-please-change}
      JWT_ACCESS_TOKEN_EXPIRES_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRES_MINUTES:-60}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-another-secret-key-please-change}
      FLASK_LOG_LEVEL: ${FLASK_LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL_INTERNAL:-postgresql+psycopg://${DB_USER:-fanqie_user}:${DB_PASSWORD:-fanqie_pass_26013}@postgres:5432/${DB_NAME:-fanqie_db}}
      DATABASE_FALLBACK_URL: ${DATABASE_FALLBACK_URL:-sqlite:////app/data/fanqie.db}
      DATABASE_FALLBACK_ON_FAILURE: ${DATABASE_FALLBACK_ON_FAILURE:-true}
      AUTO_CREATE_TABLES: ${AUTO_CREATE_TABLES_INTERNAL:-true}
      SQLALCHEMY_ECHO: ${SQLALCHEMY_ECHO:-False}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      TZ: ${TZ:-UTC}
      DATA_BASE_PATH: /app/data
      NOVEL_SAVE_PATH: /app/data/novel_downloads
      NOVEL_STATUS_PATH: /app/data/novel_status
      NOVEL_MAX_WORKERS: ${NOVEL_MAX_WORKERS:-5}
      NOVEL_REQUEST_TIMEOUT: ${NOVEL_REQUEST_TIMEOUT:-20}
      NOVEL_MAX_RETRIES: ${NOVEL_MAX_RETRIES:-3}
      NOVEL_MIN_WAIT_TIME: ${NOVEL_MIN_WAIT_TIME:-800}
      NOVEL_MAX_WAIT_TIME: ${NOVEL_MAX_WAIT_TIME:-1500}
      NOVEL_MIN_CONNECT_TIMEOUT: ${NOVEL_MIN_CONNECT_TIMEOUT:-3.1}
      NOVEL_FORMAT: ${NOVEL_FORMAT:-txt}
      NOVEL_BULK_FILES: ${NOVEL_BULK_FILES:-False}
      NOVEL_AUTO_CLEAR_DUMP: ${NOVEL_AUTO_CLEAR_DUMP:-True}
      NOVEL_USE_THIRDPARTY_API: ${NOVEL_USE_THIRDPARTY_API:-True}
      NOVEL_USE_OFFICIAL_API: ${NOVEL_USE_OFFICIAL_API:-False}
      NOVEL_USE_PROXY_API: ${NOVEL_USE_PROXY_API:-False}
      NOVEL_USE_CUSTOM_CONTENT_API: ${NOVEL_USE_CUSTOM_CONTENT_API:-True}
      NOVEL_CUSTOM_CONTENT_API_BASE: ${NOVEL_CUSTOM_CONTENT_API_BASE:-http://117.24.4.119:11451/fqy/api_v2.php}
      FQ_API_KEY: ${FQ_API_KEY}
      NOVEL_IID: ${NOVEL_IID:-}
      NOVEL_IID_SPAWN_TIME: ${NOVEL_IID_SPAWN_TIME:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:26013,http://127.0.0.1:26013}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.build_opener(urllib.request.ProxyHandler({})).open('http://127.0.0.1:5000/healthz', timeout=5)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: gunicorn --bind 0.0.0.0:5000 --worker-class=eventlet --log-level=${FLASK_LOG_LEVEL:-INFO} "app:app"
    restart: always

  celery_worker:
    build:
      context: backend
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./backend/novel_downloader:/app/novel_downloader
    environment:
      PYTHONPATH: /app
      FLASK_APP: app.py
      FLASK_ENV: ${FLASK_ENV:-production}
      PYTHONUNBUFFERED: "1"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-a-very-secret-key-please-change}
      JWT_ACCESS_TOKEN_EXPIRES_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRES_MINUTES:-60}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-another-secret-key-please-change}
      FLASK_LOG_LEVEL: ${FLASK_LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL_INTERNAL:-postgresql+psycopg://${DB_USER:-fanqie_user}:${DB_PASSWORD:-fanqie_pass_26013}@postgres:5432/${DB_NAME:-fanqie_db}}
      DATABASE_FALLBACK_URL: ${DATABASE_FALLBACK_URL:-sqlite:////app/data/fanqie.db}
      DATABASE_FALLBACK_ON_FAILURE: ${DATABASE_FALLBACK_ON_FAILURE:-true}
      AUTO_CREATE_TABLES: ${AUTO_CREATE_TABLES_INTERNAL:-true}
      SQLALCHEMY_ECHO: ${SQLALCHEMY_ECHO:-False}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      TZ: ${TZ:-UTC}
      DATA_BASE_PATH: /app/data
      NOVEL_SAVE_PATH: /app/data/novel_downloads
      NOVEL_STATUS_PATH: /app/data/novel_status
      NOVEL_MAX_WORKERS: ${NOVEL_MAX_WORKERS:-5}
      NOVEL_REQUEST_TIMEOUT: ${NOVEL_REQUEST_TIMEOUT:-20}
      NOVEL_MAX_RETRIES: ${NOVEL_MAX_RETRIES:-3}
      NOVEL_MIN_WAIT_TIME: ${NOVEL_MIN_WAIT_TIME:-800}
      NOVEL_MAX_WAIT_TIME: ${NOVEL_MAX_WAIT_TIME:-1500}
      NOVEL_MIN_CONNECT_TIMEOUT: ${NOVEL_MIN_CONNECT_TIMEOUT:-3.1}
      NOVEL_FORMAT: ${NOVEL_FORMAT:-txt}
      NOVEL_BULK_FILES: ${NOVEL_BULK_FILES:-False}
      NOVEL_AUTO_CLEAR_DUMP: ${NOVEL_AUTO_CLEAR_DUMP:-True}
      NOVEL_USE_THIRDPARTY_API: ${NOVEL_USE_THIRDPARTY_API:-True}
      NOVEL_USE_OFFICIAL_API: ${NOVEL_USE_OFFICIAL_API:-False}
      NOVEL_USE_PROXY_API: ${NOVEL_USE_PROXY_API:-False}
      NOVEL_USE_CUSTOM_CONTENT_API: ${NOVEL_USE_CUSTOM_CONTENT_API:-True}
      NOVEL_CUSTOM_CONTENT_API_BASE: ${NOVEL_CUSTOM_CONTENT_API_BASE:-http://117.24.4.119:11451/fqy/api_v2.php}
      FQ_API_KEY: ${FQ_API_KEY}
      NOVEL_IID: ${NOVEL_IID:-}
      NOVEL_IID_SPAWN_TIME: ${NOVEL_IID_SPAWN_TIME:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:26013,http://127.0.0.1:26013}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_healthy
    command: celery -A celery_init:celery_app worker --loglevel=${FLASK_LOG_LEVEL:-INFO} -O fair
    restart: always

  redis:
    image: docker.1ms.run/library/redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    ports:
      - "26013:80"

volumes:
  postgres_data:
  redis_data:
